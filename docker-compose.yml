services:
  commhealth-api:
    build: .
    ports:
      - "8765:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@commhealth-db:5432/${POSTGRES_DB:-commhealth}
      REDDIT_USER_AGENT: ${REDDIT_USER_AGENT:?REDDIT_USER_AGENT must be set in .env}
      REDDIT_REQUEST_DELAY: ${REDDIT_REQUEST_DELAY:-1.0}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    depends_on:
      commhealth-db:
        condition: service_healthy
    restart: unless-stopped

  commhealth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-commhealth}
    ports:
      - "15432:5432"
    volumes:
      - commhealth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-commhealth}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  commhealth-frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - commhealth-api
    restart: unless-stopped

volumes:
  commhealth_postgres_data:
